<app-loading-bar></app-loading-bar>

<app-vertical-navigation
    class="spadm-sidebar dark print:hidden"
    [mode]="isScreenSmall ? 'over' : 'side'"
    [name]="'mainNavigation'"
    [navigation]="navigation.default"
    [opened]="!isScreenSmall"
>
    <ng-container appVerticalNavigationContentHeader>
        <div
            class="flex w-full items-center border-b border-white/10 px-5 py-4"
        >
            <div class="flex items-center gap-3">
                <img
                    src="images/logo/logo-spadm.png"
                    class="h-12 w-12 rounded-lg object-cover"
                />
                <div class="min-w-0">
                    <div class="text-lg font-black leading-none text-white">
                        SPADM
                    </div>
                    <div
                        class="mt-1 text-xs font-semibold leading-tight text-sky-100"
                    >
                        Serikat Pekerja Astra Daihatsu Motor
                    </div>
                </div>
            </div>
            <div class="ml-auto flex items-center">
                <user [showAvatar]="false"></user>
            </div>
        </div>
        <div class="flex w-full flex-col items-center p-4">
            <div class="relative h-24 w-24">
                @if (user?.avatar) {
                    <img
                        class="h-full w-full rounded-full"
                        [src]="user?.avatar"
                        alt="User avatar"
                    />
                }
                @if (!user?.avatar) {
                    <mat-icon
                        class="icon-size-24"
                        [svgIcon]="'heroicons_solid:user-circle'"
                    ></mat-icon>
                }
            </div>
            <div class="mt-6 flex w-full flex-col items-center justify-center">
                <div
                    class="w-full overflow-hidden text-ellipsis whitespace-nowrap text-center font-medium leading-normal"
                >
                    {{ user?.name }}
                </div>
                <div
                    class="text-secondary mt-0.5 w-full overflow-hidden text-ellipsis whitespace-nowrap text-center text-md font-medium leading-normal"
                >
                    {{ user?.email }}
                </div>
            </div>
        </div>
    </ng-container>
    <ng-container appVerticalNavigationContentFooter>
        <div
            class="mb-4 mt-2 flex h-16 flex-0 items-center justify-center pl-2 pr-6 opacity-12"
        ></div>
    </ng-container>
</app-vertical-navigation>

<div class="flex w-full min-w-0 min-h-0 flex-auto flex-col">
    <div
        class="spadm-shell-header relative z-49 flex h-16 w-full flex-0 items-center px-4 shadow-sm dark:border-b md:px-6 print:hidden"
    >
        <button mat-icon-button (click)="toggleNavigation('mainNavigation')">
            <mat-icon [svgIcon]="'heroicons_outline:bars-3'"></mat-icon>
        </button>
        <div class="ml-3 min-w-0">
            <div
                class="text-base font-black leading-none text-[var(--spadm-navy)]"
            >
                SPADM Super App
            </div>
            <div
                class="mt-1 hidden text-xs font-semibold text-slate-500 sm:block"
            >
                Kolaborasi, smart media, dan layanan anggota
            </div>
        </div>
        <div class="ml-auto flex items-center space-x-0.5 pl-2 sm:space-x-2">
            <button mat-icon-button (click)="toggleScheme()" [matTooltip]="'Tema: ' + scheme">
                <mat-icon [svgIcon]="schemeIcons[scheme]"></mat-icon>
            </button>
            <app-fullscreen class="hidden md:block"></app-fullscreen>

            <!-- User info + avatar -->
            <div class="flex items-center gap-2 pl-2 border-l border-slate-200 dark:border-gray-700 ml-1">
                <div class="hidden sm:flex flex-col items-end min-w-0">
                    <span class="text-sm font-bold leading-tight text-[var(--spadm-navy)] dark:text-white truncate max-w-32">
                        {{ user?.name }}
                    </span>
                    <span class="text-xs font-medium leading-tight text-slate-500 dark:text-gray-400 truncate max-w-32">
                        {{ user?.role?.name || '-' }}
                    </span>
                </div>
                <user [showAvatar]="true"></user>
            </div>
        </div>
    </div>

    <div class="flex h-0 flex-1 flex-col overflow-y-auto">
        @if (true) {
            <router-outlet></router-outlet>
        }
    </div>
</div>
