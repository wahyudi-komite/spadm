<div class="flex flex-col flex-auto min-w-0 p-6 sm:p-10">
    <div class="flex items-center justify-between w-full mb-6">
        <div class="text-3xl font-semibold tracking-tight">Manajemen Batch Bazar</div>
        <button mat-flat-button color="primary" (click)="createBatch()">
            <mat-icon>add</mat-icon>
            Tambah Batch
        </button>
    </div>

    <div class="bg-card shadow rounded-2xl overflow-hidden">
        <table mat-table [dataSource]="batches" class="w-full">
            <ng-container matColumnDef="id">
                <th mat-header-cell *matHeaderCellDef>ID</th>
                <td mat-cell *matCellDef="let element">{{element.id}}</td>
            </ng-container>

            <ng-container matColumnDef="event">
                <th mat-header-cell *matHeaderCellDef>Event</th>
                <td mat-cell *matCellDef="let element">{{element.event?.name || 'Unknown'}}</td>
            </ng-container>

            <ng-container matColumnDef="name">
                <th mat-header-cell *matHeaderCellDef>Nama Batch</th>
                <td mat-cell *matCellDef="let element">{{element.name}}</td>
            </ng-container>

            <ng-container matColumnDef="status">
                <th mat-header-cell *matHeaderCellDef>Status</th>
                <td mat-cell *matCellDef="let element">
                    <span class="px-2 py-1 text-xs font-semibold rounded-full bg-blue-100 text-blue-800">
                        {{element.status}}
                    </span>
                </td>
            </ng-container>

            <ng-container matColumnDef="actions">
                <th mat-header-cell *matHeaderCellDef>Aksi</th>
                <td mat-cell *matCellDef="let element">
                    <button mat-icon-button (click)="editBatch(element)" matTooltip="Edit">
                        <mat-icon>edit</mat-icon>
                    </button>
                    <button mat-button color="primary" (click)="changeStatus(element, 'OPEN')" *ngIf="element.status === 'DRAFT' || element.status === 'CLOSED'">Buka</button>
                    <button mat-button color="warn" (click)="changeStatus(element, 'CLOSED')" *ngIf="element.status === 'OPEN'">Tutup</button>
                    <button mat-icon-button color="warn" (click)="deleteBatch(element.id)">
                        <mat-icon>delete</mat-icon>
                    </button>
                </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>
        
        <div *ngIf="batches.length === 0" class="p-8 text-center text-gray-500">
            Belum ada batch.
        </div>
    </div>
</div>
