<div class="flex flex-col flex-auto min-w-0 p-6 sm:p-10">
    <div class="flex items-center justify-between w-full mb-6">
        <div class="text-3xl font-semibold tracking-tight">Pemetaan Area Pengambilan</div>
        <button mat-flat-button color="primary" (click)="createMapping()">
            <mat-icon>add</mat-icon>
            Tambah Mapping
        </button>
    </div>

    <div class="bg-card shadow rounded-2xl overflow-hidden">
        <table mat-table [dataSource]="mappings" matSort class="w-full">
            <ng-container matColumnDef="id">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>ID</th>
                <td mat-cell *matCellDef="let element">{{element.id}}</td>
            </ng-container>

            <ng-container matColumnDef="plant">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>Plant</th>
                <td mat-cell *matCellDef="let element">{{element.plant}}</td>
            </ng-container>

            <ng-container matColumnDef="workUnit">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>Unit Kerja</th>
                <td mat-cell *matCellDef="let element">{{element.workUnit}}</td>
            </ng-container>

            <ng-container matColumnDef="areaCode">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>Area</th>
                <td mat-cell *matCellDef="let element">{{element.distributionArea?.code || 'Unknown'}}</td>
            </ng-container>

            <ng-container matColumnDef="actions">
                <th mat-header-cell *matHeaderCellDef>Aksi</th>
                <td mat-cell *matCellDef="let element">
                    <button mat-icon-button (click)="editMapping(element)" matTooltip="Edit">
                        <mat-icon>edit</mat-icon>
                    </button>
                    <button mat-icon-button color="warn" (click)="deleteMapping(element.id)">
                        <mat-icon>delete</mat-icon>
                    </button>
                </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>
        
        <div *ngIf="mappings.data.length === 0" class="p-8 text-center text-gray-500">
            Belum ada pemetaan area.
        </div>
    </div>
</div>
