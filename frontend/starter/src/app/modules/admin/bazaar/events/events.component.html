<div class="flex flex-col flex-auto min-w-0 p-6 sm:p-10">
    <div class="flex items-center justify-between w-full mb-6">
        <div class="text-3xl font-semibold tracking-tight">Manajemen Event Bazar</div>
        <button mat-flat-button color="primary" (click)="createEvent()">
            <mat-icon>add</mat-icon>
            Tambah Event
        </button>
    </div>

    <div class="bg-card shadow rounded-2xl overflow-hidden">
        <table mat-table [dataSource]="events" class="w-full">
            <ng-container matColumnDef="id">
                <th mat-header-cell *matHeaderCellDef>ID</th>
                <td mat-cell *matCellDef="let element">{{element.id}}</td>
            </ng-container>

            <ng-container matColumnDef="name">
                <th mat-header-cell *matHeaderCellDef>Nama Event</th>
                <td mat-cell *matCellDef="let element">{{element.name}}</td>
            </ng-container>

            <ng-container matColumnDef="isActive">
                <th mat-header-cell *matHeaderCellDef>Status</th>
                <td mat-cell *matCellDef="let element">
                    <span class="px-2 py-1 text-xs font-semibold rounded-full"
                        [ngClass]="{'bg-green-100 text-green-800': element.isActive, 'bg-gray-100 text-gray-800': !element.isActive}">
                        {{element.isActive ? 'Aktif' : 'Tidak Aktif'}}
                    </span>
                </td>
            </ng-container>

            <ng-container matColumnDef="actions">
                <th mat-header-cell *matHeaderCellDef>Aksi</th>
                <td mat-cell *matCellDef="let element">
                    <button mat-icon-button color="primary" (click)="toggleActive(element)">
                        <mat-icon>{{element.isActive ? 'block' : 'check_circle'}}</mat-icon>
                    </button>
                    <button mat-icon-button color="warn" (click)="deleteEvent(element.id)">
                        <mat-icon>delete</mat-icon>
                    </button>
                </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>
        
        <div *ngIf="events.length === 0" class="p-8 text-center text-gray-500">
            Belum ada event bazar.
        </div>
    </div>
</div>
