<div class="flex flex-col flex-auto min-w-0 p-6 sm:p-10">
    <div class="flex items-center justify-between w-full mb-6">
        <div class="text-3xl font-semibold tracking-tight">Katalog Produk Bazar</div>
        <button mat-flat-button color="primary" (click)="createProduct()">
            <mat-icon>add</mat-icon>
            Tambah Produk
        </button>
    </div>

    <div class="bg-card shadow rounded-2xl overflow-hidden">
        <table mat-table [dataSource]="products" class="w-full">
            <ng-container matColumnDef="id">
                <th mat-header-cell *matHeaderCellDef>ID</th>
                <td mat-cell *matCellDef="let element">{{element.id}}</td>
            </ng-container>

            <ng-container matColumnDef="name">
                <th mat-header-cell *matHeaderCellDef>Nama Produk</th>
                <td mat-cell *matCellDef="let element">{{element.name}}</td>
            </ng-container>

            <ng-container matColumnDef="sku">
                <th mat-header-cell *matHeaderCellDef>SKU</th>
                <td mat-cell *matCellDef="let element">{{element.sku}}</td>
            </ng-container>

            <ng-container matColumnDef="sellingPrice">
                <th mat-header-cell *matHeaderCellDef>Harga Jual</th>
                <td mat-cell *matCellDef="let element">Rp {{element.sellingPrice | number}}</td>
            </ng-container>

            <ng-container matColumnDef="stock">
                <th mat-header-cell *matHeaderCellDef>Stok</th>
                <td mat-cell *matCellDef="let element">{{element.stock}} ({{element.inventoryMode}})</td>
            </ng-container>

            <ng-container matColumnDef="actions">
                <th mat-header-cell *matHeaderCellDef>Aksi</th>
                <td mat-cell *matCellDef="let element">
                    <button mat-icon-button color="warn" (click)="deleteProduct(element.id)">
                        <mat-icon>delete</mat-icon>
                    </button>
                </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>
        
        <div *ngIf="products.length === 0" class="p-8 text-center text-gray-500">
            Belum ada produk bazar.
        </div>
    </div>
</div>
