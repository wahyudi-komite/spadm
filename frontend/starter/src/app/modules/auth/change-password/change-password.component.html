<div
    class="flex min-w-0 flex-auto flex-col items-center bg-gradient-to-t from-blue-100 via-white to-red-50 dark:from-gray-950 dark:via-gray-900 dark:to-slate-900 sm:justify-center">
    <div class="relative w-full px-4 py-8 sm:bg-card sm:w-auto sm:rounded-2xl sm:p-12 sm:shadow">
        <button mat-icon-button type="button" class="absolute right-3 top-3" aria-label="Ganti password nanti dan lanjutkan"
            title="Ganti password nanti" [disabled]="changePasswordForm.disabled" (click)="close()">
            <mat-icon [svgIcon]="'heroicons_outline:x-mark'"></mat-icon>
        </button>
        <div class="mx-auto w-full max-w-80 sm:mx-0 sm:w-80">
            <div class="flex w-full justify-center">
                <img src="images/logo/logo-spadm.png" class="max-w-32" alt="Logo SPADM" />
            </div>

            <h4 class="mt-4 font-sans text-2xl font-bold leading-snug tracking-normal text-blue-600 antialiased">
                Ubah Password
            </h4>
            <h3 class="mt-1 font-sans text-md font-normal text-gray-700 dark:text-gray-300">
                Anda harus mengubah password sebelum melanjutkan
            </h3>

            @if (showAlert) {
            <p-message class="mt-8" [severity]="alert.type" [text]="alert.message"></p-message>
            }

            <form class="mt-8" [formGroup]="changePasswordForm" #changePasswordNgForm="ngForm" novalidate>
                <mat-form-field class="w-full">
                    <mat-label>Password Saat Ini</mat-label>
                    <input id="currentPassword" matInput type="password" [formControlName]="'currentPassword'"
                        #currentPasswordField />
                    <button mat-icon-button type="button" matSuffix
                        [attr.aria-label]="currentPasswordField.type === 'password' ? 'Tampilkan password saat ini' : 'Sembunyikan password saat ini'"
                        (click)="currentPasswordField.type = currentPasswordField.type === 'password' ? 'text' : 'password'">
                        <mat-icon class="icon-size-5"
                            [svgIcon]="currentPasswordField.type === 'password' ? 'heroicons_solid:eye' : 'heroicons_solid:eye-slash'"></mat-icon>
                    </button>
                    <mat-error> Password saat ini wajib diisi </mat-error>
                </mat-form-field>

                <mat-form-field class="w-full">
                    <mat-label>Password Baru</mat-label>
                    <input id="newPassword" matInput type="password" [formControlName]="'newPassword'"
                        #newPasswordField />
                    <button mat-icon-button type="button" matSuffix
                        [attr.aria-label]="newPasswordField.type === 'password' ? 'Tampilkan password baru' : 'Sembunyikan password baru'"
                        (click)="newPasswordField.type = newPasswordField.type === 'password' ? 'text' : 'password'">
                        <mat-icon class="icon-size-5"
                            [svgIcon]="newPasswordField.type === 'password' ? 'heroicons_solid:eye' : 'heroicons_solid:eye-slash'"></mat-icon>
                    </button>
                    <mat-error> Password baru minimal 8 karakter </mat-error>
                </mat-form-field>

                <mat-form-field class="w-full">
                    <mat-label>Konfirmasi Password Baru</mat-label>
                    <input id="confirmPassword" matInput type="password" [formControlName]="'confirmPassword'"
                        #confirmPasswordField />
                    <button mat-icon-button type="button" matSuffix
                        [attr.aria-label]="confirmPasswordField.type === 'password' ? 'Tampilkan konfirmasi password' : 'Sembunyikan konfirmasi password'"
                        (click)="confirmPasswordField.type = confirmPasswordField.type === 'password' ? 'text' : 'password'">
                        <mat-icon class="icon-size-5"
                            [svgIcon]="confirmPasswordField.type === 'password' ? 'heroicons_solid:eye' : 'heroicons_solid:eye-slash'"></mat-icon>
                    </button>
                    <mat-error> Konfirmasi password wajib diisi </mat-error>
                </mat-form-field>

                <button class="fuse-mat-button-large mt-6 w-full" mat-flat-button [color]="'primary'"
                    [disabled]="changePasswordForm.disabled" (click)="changePassword()">
                    @if (!changePasswordForm.disabled) {
                    <span> Simpan </span>
                    }
                    @if (changePasswordForm.disabled) {
                    <mat-progress-spinner [diameter]="24" [mode]="'indeterminate'"></mat-progress-spinner>
                    }
                </button>
            </form>
        </div>
    </div>
</div>
