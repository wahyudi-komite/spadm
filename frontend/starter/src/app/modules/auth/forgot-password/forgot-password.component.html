<div
    class="flex min-w-0 flex-auto flex-col items-center overflow-y-auto bg-[radial-gradient(circle_at_50%_0%,rgba(0,159,227,0.18),transparent_32rem),linear-gradient(180deg,#f8fbff_0%,#edf5fb_100%)] dark:bg-gray-950 sm:justify-center">
    <div class="w-full px-4 py-8 sm:bg-card sm:w-auto sm:rounded-xl sm:border sm:border-blue-100 sm:p-12 sm:shadow-xl dark:sm:bg-gray-900 dark:sm:border-gray-700">
        <div class="mx-auto w-full max-w-80 sm:mx-0 sm:w-80">
            <div class="flex w-full justify-center">
                <div class="relative">
                    <div class="logo-ring"></div>
                    <img src="images/logo/logo-spadm.png" class="relative h-40 w-40" />
                </div>
            </div>

            <style>
                .logo-ring {
                    position: absolute;
                    inset: 4px;
                    border-radius: 9999px;
                    border: 2px solid var(--spadm-blue);
                    animation: logoPulse 2s ease-in-out infinite;
                }
                @keyframes logoPulse {
                    0%, 100% { transform: scale(1); opacity: 0.6; }
                    50% { transform: scale(1.1); opacity: 0; }
                }
            </style>

            <h4 class="mt-5 text-center font-sans text-4xl font-black leading-snug tracking-normal text-[var(--spadm-navy)] dark:text-white antialiased">
                SPADM
            </h4>
            <h3 class="mt-1 text-center font-sans text-md font-semibold text-slate-600 dark:text-gray-400">
                Serikat Pekerja Astra Daihatsu Motor
            </h3>
            <div class="mx-auto mt-4 h-1 w-20 rounded-full bg-[linear-gradient(90deg,var(--spadm-blue),var(--spadm-sky),var(--spadm-red))]">
            </div>

            <div class="mt-6 text-lg font-extrabold leading-tight tracking-tight text-[var(--spadm-ink)]">
                Lupa Password?
            </div>
            <div class="mt-0.5 text-sm font-medium text-slate-500 dark:text-gray-400">
                Masukkan NPK Anda untuk mereset password
            </div>

            @if (showAlert) {
                <p-message class="mt-8" [severity]="alert.type" [text]="alert.message"></p-message>
            }

            <form class="mt-8" [formGroup]="forgotPasswordForm" #forgotPasswordNgForm="ngForm">
                <mat-form-field class="w-full" floatLabel="always">
                    <mat-label>Input NPK</mat-label>
                    <input id="npk" matInput [formControlName]="'npk'" placeholder="Masukkan NPK Anda" />
                    @if (forgotPasswordForm.get('npk').hasError('required')) {
                        <mat-error> NPK wajib diisi </mat-error>
                    }
                </mat-form-field>

                <button class="fuse-mat-button-large mt-4 w-full" mat-flat-button [color]="'primary'"
                    [disabled]="forgotPasswordForm.disabled" (click)="sendResetLink()">
                    @if (!forgotPasswordForm.disabled) {
                        <span> Kirim Link Reset </span>
                    }
                    @if (forgotPasswordForm.disabled) {
                        <mat-progress-spinner [diameter]="24" [mode]="'indeterminate'"></mat-progress-spinner>
                    }
                </button>

                <div class="mt-6 text-center text-md font-medium text-slate-500 dark:text-gray-400">
                    <span>Kembali ke</span>
                    <a class="ml-1 text-[var(--spadm-blue)] hover:text-[var(--spadm-sky)] hover:underline font-semibold"
                       [routerLink]="['/sign-in']">
                        Masuk
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
