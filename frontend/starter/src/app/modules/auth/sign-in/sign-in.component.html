<div class="flex min-w-0 flex-auto flex-col items-center bg-gradient-to-t from-blue-100 via-white to-red-50 sm:justify-center">
    <div class="w-full px-4 py-8 sm:bg-card sm:w-auto sm:rounded-2xl sm:p-12 sm:shadow">
        <div class="mx-auto w-full max-w-80 sm:mx-0 sm:w-80">
            <div class="flex w-full justify-center">
                <img src="images/logo/logo_small.png" class="max-w-42" />
            </div>

            <h4 class="mt-4 font-sans text-4xl font-bold leading-snug tracking-normal text-blue-600 antialiased">
                SPADM
            </h4>
            <h3 class="mt-1 font-sans text-md font-normal text-gray-700">
                Serikat Pekerja Astra Daihatsu Motor
            </h3>

            <div class="mt-4 text-lg font-extrabold leading-tight tracking-tight">
                Masuk
            </div>

            @if (showAlert) {
                <p-message class="mt-8" [severity]="alert.type" [text]="alert.message"></p-message>
            }

            <form class="mt-8" [formGroup]="signInForm" #signInNgForm="ngForm" novalidate>
                <mat-form-field class="w-full">
                    <mat-label>NPK</mat-label>
                    <input id="npk" matInput placeholder="Masukkan NPK" [formControlName]="'npk'" />
                    @if (signInForm.get('npk').hasError('required')) {
                        <mat-error> NPK wajib diisi </mat-error>
                    }
                </mat-form-field>

                <mat-form-field class="w-full">
                    <mat-label>Password</mat-label>
                    <input id="password" matInput type="password" [formControlName]="'password'" #passwordField />
                    <button mat-icon-button type="button"
                        (click)="passwordField.type === 'password' ? (passwordField.type = 'text') : (passwordField.type = 'password')"
                        matSuffix>
                        @if (passwordField.type === 'password') {
                            <mat-icon class="icon-size-5" [svgIcon]="'heroicons_solid:eye'"></mat-icon>
                        }
                        @if (passwordField.type === 'text') {
                            <mat-icon class="icon-size-5" [svgIcon]="'heroicons_solid:eye-slash'"></mat-icon>
                        }
                    </button>
                    <mat-error> Password wajib diisi </mat-error>
                </mat-form-field>

                <button class="fuse-mat-button-large mt-6 w-full" mat-flat-button [color]="'primary'"
                    [disabled]="signInForm.disabled" (click)="signIn()">
                    @if (!signInForm.disabled) {
                        <span> Masuk </span>
                    }
                    @if (signInForm.disabled) {
                        <mat-progress-spinner [diameter]="24" [mode]="'indeterminate'"></mat-progress-spinner>
                    }
                </button>
            </form>

            <div class="mt-6 border-t pt-4">
                <div class="mb-2 text-xs font-semibold text-gray-500 uppercase tracking-wide">Quick Login (Development)</div>
                <div class="flex flex-wrap gap-1.5">
                    @for (user of quickUsers; track user.npk) {
                        <button mat-stroked-button [color]="user.color" (click)="quickLogin(user.npk)" class="!text-xs !min-w-0 !px-2 !py-0.5 !h-7">
                            {{ user.label }}
                        </button>
                    }
                </div>
            </div>
        </div>
    </div>
</div>
